<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Notified</title>
  <style>
    @font-face {
      font-family: 'SF Pro Display';
      src: url('../fonts/SF-Pro-Display-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }
    h1 {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 0.2px;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1vw, 24px);
      width: 100%;
    }
    input {
      width: 300px;
      height: calc(1.84em + 3px);
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 0;
      padding: 0 5px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.35);
      background: #fff;
      outline: none;
      transition: color 0.2s, border-color 0.2s;
    }
    input.filled {
      color: #000;
      border-color: #000;
    }
    input::placeholder {
      color: rgba(0, 0, 0, 0.35);
    }
    .signup {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.5);
      text-align: center;
      margin-top: 30px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      transition: color 0.2s;
    }
    .signup.active {
      color: #000;
    }
    footer {
      text-align: center;
      position: absolute;
      bottom: 30px;
    }
    footer p {
      font-size: 9px;
      font-weight: 400;
      line-height: 1.2;
    }
    footer .copyright {
      color: rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="content">
    <form>
      <h1>Get notified on release.</h1>
      <input type="text" placeholder="First Name" required>
      <input type="text" placeholder="Last Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="email" placeholder="Email (Optional)">
      <button type="submit" class="signup">Sign Up</button>
    </form>
    <script>
      const inputs = document.querySelectorAll('input');
      const signup = document.querySelector('.signup');
      const required = document.querySelectorAll('input[required]');

      inputs.forEach(input => {
        input.addEventListener('input', () => {
          input.classList.toggle('filled', input.value.length > 0);
          const allFilled = [...required].every(r => r.value.trim().length > 0);
          signup.classList.toggle('active', allFilled);
        });
      });

      document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        const allFilled = [...required].every(r => r.value.trim().length > 0);
        if (!allFilled) return;
        const [firstName, lastName, phone, email] = inputs;
        fetch('https://script.google.com/macros/s/AKfycbyp1dE317CrrsLMsSO77UcwiOCjPF-rCNFtLN1uVIYnQh5bSqHTkv1P27FVSbCnO0t3/exec', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            firstName: firstName.value,
            lastName: lastName.value,
            phone: phone.value,
            email: email.value
          })
        });
        signup.textContent = 'Thank You.';
      });
    </script>
  </div>
  <footer>
    <p>We will not distribute your information.</p>
    <p class="copyright">Dolce Vita, 2026 &copy;</p>
  </footer>
</body>
</html>
