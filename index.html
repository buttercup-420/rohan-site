<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Hedvig Letters Sans', sans-serif;
    }
    #countdown {
      color: #000;
      font-size: clamp(16px, 3.9vw, 100px);
      font-weight: 400;
      white-space: nowrap;
      text-align: center;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Sans&display=swap" rel="stylesheet">
</head>
<body>
  <div id="countdown"></div>
  <script>
    const target = new Date('2026-05-30T00:00:00').getTime();

    function update() {
      const now = Date.now();
      let diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').textContent = '00:00:00:00 MAY 30 2026';
        return;
      }

      const days = String(Math.floor(diff / 86400000)).padStart(2, '0');
      diff %= 86400000;
      const hours = String(Math.floor(diff / 3600000)).padStart(2, '0');
      diff %= 3600000;
      const mins = String(Math.floor(diff / 60000)).padStart(2, '0');
      diff %= 60000;
      const secs = String(Math.floor(diff / 1000)).padStart(2, '0');

      document.getElementById('countdown').textContent =
        `${days}:${hours}:${mins}:${secs} MAY 30 2026`;

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
</html>
