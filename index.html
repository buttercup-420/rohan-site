<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolce Vita</title>
  <meta property="og:title" content="Dolce Vita">
  <meta property="og:description" content="Coming May 30, 2026">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dolcevitamovie.com">
  <meta property="og:image" content="https://dolcevitamovie.com/og-image.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @font-face {
      font-family: 'SF Pro Display';
      src: url('fonts/SF-Pro-Display-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; height: 100vh; }
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #000;
    }
    #countdown {
      font-size: clamp(14px, 5vw, 30px);
      font-weight: 400;
      white-space: nowrap;
      text-align: center;
    }
    #notify {
      position: absolute;
      bottom: 25%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 400;
      text-align: center;
    }
    #notify a {
      color: #000;
      text-decoration: underline;
      text-decoration-color: rgba(0, 0, 0, 0.35);
    }
    #notify span {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="countdown"></div>
  <p id="notify"><a href="/signup">Get notified</a><span> on release.</span></p>
  <script>
    const target = new Date('2026-05-30T00:00:00').getTime();

    function update() {
      const now = Date.now();
      let diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML = '00 : 00 : 00 : 00&emsp;&emsp;MAY 30 2026';
        return;
      }

      const days = String(Math.floor(diff / 86400000)).padStart(2, '0');
      diff %= 86400000;
      const hours = String(Math.floor(diff / 3600000)).padStart(2, '0');
      diff %= 3600000;
      const mins = String(Math.floor(diff / 60000)).padStart(2, '0');
      diff %= 60000;
      const secs = String(Math.floor(diff / 1000)).padStart(2, '0');

      document.getElementById('countdown').innerHTML =
        `${days} : ${hours} : ${mins} : ${secs}&emsp;&emsp;MAY 30 2026`;

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
</html>
